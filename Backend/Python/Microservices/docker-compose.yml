version: "3.9"

services:
  authentication-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "14331:1433"
    volumes:
      - authentication-db-data:/var/opt/mssql

  product-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "14332:1433"
    volumes:
      - product-db-data:/var/opt/mssql

  user-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "14333:1433"
    volumes:
      - user-db-data:/var/opt/mssql



  authentication-service:
    build: ./authentication-service
    ports:
      - "8001:8000"
    environment:
      DB_SERVER_URL: "mssql+pyodbc://sa:StrONgPASswoRD123!@authentication-db:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      SECRET_KEY: ${JWT_SECRET}
    depends_on:
      - authentication-db
  
  product-service:
    build: ./product-service
    ports:
      - "8002:8000"
    environment:
      DB_SERVER_URL: "mssql+pyodbc://sa:StrONgPASswoRD123!@product-db:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
    depends_on:
      - product-db
  
  user-service:
    build: ./user-service
    ports:
      - "8003:8000"
    environment:
      DB_SERVER_URL: "mssql+pyodbc://sa:StrONgPASswoRD123!@user-db:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
    depends_on:
      - user-db





volumes:
  authentication-db-data:
  product-db-data:
  user-db-data: